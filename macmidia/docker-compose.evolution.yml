version: '3.3'

services:
  evolution_api:
    container_name: evolution_api
    image: atendai/evolution-api:v1.8.3
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - evolution_data:/evolution/instances
    environment:
      # --- Server ---
      - SERVER_URL=http://localhost:8080
      # --- Auth ---
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=4224771A-8F12-4FF2-A9F6-444455556666
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      # --- Storage ---
      - DATABASE_ENABLED=false
      - REDIS_ENABLED=false
      # --- Webhook ---
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=https://ebvvmddizsggrqasnnvv.supabase.co/functions/v1/whatsapp-webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS=MESSAGES_UPSERT
      
volumes:
  evolution_data:
